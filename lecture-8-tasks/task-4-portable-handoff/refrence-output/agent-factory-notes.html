let current = 0;
const visited = new Set();
const rail = document.getElementById('indexRail');
const host = document.getElementById('cardHost');
const meterFill = document.getElementById('meterFill');
const meterText = document.getElementById('meterText');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

CARDS.forEach((c, i) => {
  const b = document.createElement('button');
  b.textContent = (i+1) + '. ' + c.tag.split('·')[1].trim();
  b.dataset.idx = i;
  b.addEventListener('click', () => goTo(i));
  rail.appendChild(b);
});

function renderCard(i){
  const c = CARDS[i];
  visited.add(i);
  host.innerHTML = `
    <div class="tag">${c.tag}</div>
    <h2>${c.title}</h2>
    <ul class="notes">${c.notes.map(n => `<li>${n}</li>`).join('')}</ul>
    <div class="terms">
      <h3>Key Terms — tap to reveal</h3>
      ${c.terms.map(([t,d],ti) => `
        <div class="term" id="term-${ti}">
          <button class="reveal" data-t="${ti}"><span>${t}</span><span class="plus">+</span></button>
          <div class="def">${d}</div>
        </div>`).join('')}
    </div>
  `;
  host.querySelectorAll('.reveal').forEach(btn => {
    btn.addEventListener('click', () => {
      const term = btn.closest('.term');
      term.classList.toggle('open');
      btn.querySelector('.plus').textContent = term.classList.contains('open') ? '−' : '+';
    });
  });
  updateRail();
  updateMeter();
  prevBtn.disabled = i === 0;
  nextBtn.disabled = i === CARDS.length - 1;
}

function updateRail(){
  [...rail.children].forEach((b, i) => {
    b.classList.toggle('active', i === current);
    b.classList.toggle('visited', visited.has(i) && i !== current);
  });
  const activeBtn = rail.children[current];
  if (activeBtn) activeBtn.scrollIntoView({block:'nearest', inline:'center'});
}

function updateMeter(){
  const pct = Math.round((visited.size / CARDS.length) * 100);
  meterFill.style.width = pct + '%';
  meterText.textContent = `${visited.size} / ${CARDS.length} cards visited`;
}

function goTo(i){
  current = Math.max(0, Math.min(CARDS.length - 1, i));
  renderCard(current);
}

prevBtn.addEventListener('click', () => goTo(current - 1));
nextBtn.addEventListener('click', () => goTo(current + 1));
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') goTo(current + 1);
  if (e.key === 'ArrowLeft') goTo(current - 1);
});

goTo(0);

// Quiz
const quizHost = document.getElementById('quizHost');
const scoreLine = document.getElementById('scoreLine');
let score = 0, answered = 0;

QUIZ.forEach((q, qi) => {
  const div = document.createElement('div');
  div.className = 'qcard';
  div.innerHTML = `
    <p class="q">${qi+1}. ${q.q}</p>
    ${q.options.map((opt, oi) => `<button class="opt" data-oi="${oi}" data-qi="${qi}">${String.fromCharCode(65+oi)}. ${opt}</button>`).join('')}
    <div class="explain" id="explain-${qi}">${q.explain}</div>
  `;
  quizHost.appendChild(div);
});

quizHost.addEventListener('click', (e) => {
  if (!e.target.classList.contains('opt')) return;
  const qi = +e.target.dataset.qi;
  const oi = +e.target.dataset.oi;
  const card = e.target.closest('.qcard');
  if (card.dataset.done) return;
  card.dataset.done = '1';
  answered++;
  const opts = card.querySelectorAll('.opt');
  opts.forEach(o => o.disabled = true);
  const q = QUIZ[qi];
  opts[q.correct].classList.add('correct');
  if (oi === q.correct) score++;
  else opts[oi].classList.add('wrong');
  card.querySelector('.explain').classList.add('show');
  if (answered === QUIZ.length){
    scoreLine.style.display = 'block';
    scoreLine.textContent = `Score: ${score} / ${QUIZ.length}`;
  }
});
</script>
